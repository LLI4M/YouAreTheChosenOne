<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UAreTheChosenOne</title>

<style>

body{
font-family: Arial;
background:black;
color:white;
text-align:center;
margin-top:120px;
}

#countdown{
font-size:40px;
margin-top:20px;
}

#secret{
display:none;
margin-top:30px;
font-size:22px;
}

</style>
</head>

<body>

<h1>UAreTheChosenOne</h1>

<p>Be Patient. Okay?.</p>

<div id="countdown"></div>

<div id="secret">
<p>Password untuk membuka file:</p>
<h2>2030SECRET</h2>
</div>

<script>

// UBAH WAKTU DI SINI
var targetDate = new Date("April 5, 2026 12:52:00").getTime();

var timer = setInterval(function(){

var now = new Date().getTime();
var distance = targetDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
var seconds = Math.floor((distance % (1000*60))/1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s";

if(distance < 0){

clearInterval(timer);

document.getElementById("countdown").innerHTML = "The time has come.";

document.getElementById("secret").style.display = "block";

}

},1000);

</script>

</body>
</html>
